# ros_gz_bridge configuration for conveyor belt control.
#
# Bridges between ROS2 and gz-transport so pick_place.py can
# start/stop the belt by publishing to a ROS2 topic.
#
# Start the bridge with:
#   ros2 run ros_gz_bridge parameter_bridge --ros-args -p config_file:=<path>/bridge.yaml
#
# Or use the helper script: start_bridge.sh

- ros_topic_name: "/conveyor_belt/cmd_vel"
  gz_topic_name: "/conveyor_belt/cmd_vel"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ
